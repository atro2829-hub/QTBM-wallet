name: Build Android APK

on:
  push:
    branches:
      - main  # سيعمل عندما يتم دفع التغييرات إلى فرع 'main'

jobs:
  build:
    runs-on: ubuntu-latest  # ستعمل هذه العملية في بيئة Ubuntu

    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # يقوم بسحب الكود من المستودع

      - name: Set up JDK
        uses: actions/setup-java@v2  # يقوم بتثبيت JDK
        with:
          distribution: 'temurin'
          java-version: '11'  # تأكد من أنك تستخدم النسخة الصحيحة من JDK

      - name: Build APK
        run: ./gradlew assembleRelease  # يقوم ببناء ملف الـ APK باستخدام Gradle

      - name: Upload APK as artifact
        uses: @github/actions/artifacts@v1  # استخدام النسخة الجديدة من الإجراء لإدارة الـ Artifacts
        with:
          name: app-release.apk
          path: app/build/outputs/apk/release/app-release.apk  # المسار إلى ملف الـ APK الذي تم بناءه
